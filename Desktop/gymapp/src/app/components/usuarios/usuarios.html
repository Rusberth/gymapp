<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary mb-0">
      <i class="bi bi-people-fill me-2"></i>Gestión de Usuarios
    </h2>
    <button class="btn btn-primary" (click)="abrirModal()">
      <i class="bi bi-person-plus-fill me-1"></i> Nuevo Usuario
    </button>
  </div>

  <div *ngIf="mensaje" class="alert alert-{{tipoMensaje}}">
    {{ mensaje }}
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Email</th>
              <th>Edad</th>
              <th>Teléfono</th>
              <th>Registro</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let u of usuarios; let i = index">
              <td>{{ i + 1 }}</td>
              <td><strong>{{ u.nombre }} {{ u.apellido }}</strong></td>
              <td>{{ u.email }}</td>
              <td>{{ u.edad }} años</td>
              <td>{{ u.telefono }}</td>
              <td>{{ u.fechaRegistro }}</td>
              <td class="text-center">
                <button class="btn btn-sm btn-outline-warning me-1" (click)="abrirModal(u)">
                  <i class="bi bi-pencil-fill"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="eliminar(u.id!)">
                  <i class="bi bi-trash-fill"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="usuarios.length === 0">
              <td colspan="7" class="text-center text-muted py-4">
                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                No hay usuarios registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" [class.show]="mostrarModal"
     [style.display]="mostrarModal ? 'block' : 'none'" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">
          <i class="bi bi-person-fill me-2"></i>
          {{ editando ? 'Editar Usuario' : 'Nuevo Usuario' }}
        </h5>
        <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label fw-semibold">Nombre</label>
            <input class="form-control" [(ngModel)]="usuarioForm.nombre" placeholder="Nombre">
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold">Apellido</label>
            <input class="form-control" [(ngModel)]="usuarioForm.apellido" placeholder="Apellido">
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold">Email</label>
            <input class="form-control" type="email" [(ngModel)]="usuarioForm.email" placeholder="correo@email.com">
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold">Teléfono</label>
            <input class="form-control" [(ngModel)]="usuarioForm.telefono" placeholder="70000000">
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold">Edad</label>
            <input class="form-control" type="number" [(ngModel)]="usuarioForm.edad" min="10" max="100">
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold">Fecha de Registro</label>
            <input class="form-control" type="date" [(ngModel)]="usuarioForm.fechaRegistro">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
        <button class="btn btn-primary" (click)="guardar()">
          <i class="bi bi-save me-1"></i>{{ editando ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="mostrarModal" *ngIf="mostrarModal"></div>
